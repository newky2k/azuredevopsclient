# .NET Desktop
# Build and run tests for .NET Desktop or Windows classic desktop solutions.
# Add steps that publish symbols, save build artifacts, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/windows/dot-net

trigger:
  batch: true
  branches:
    include:
    - main
    
pool:
  vmImage: 'windows-latest'

variables:
- name: solution
  value: '**/*.slnx'
- name: buildPlatform
  value: 'Any CPU'
- name: buildConfiguration
  value: 'Release'
- name: netVersion
  value: '10.0.107'

name: 1.1.$(date:yyMM).$(date:dd)$(rev:r)
steps:

- task: NuGetToolInstaller@1
  displayName: Install Latest Nuget

- task: UseDotNet@2
  displayName: 'Install .NET sdk'
  inputs:
    packageType: 'sdk'
    version: $(netVersion)

- task: Bash@3
  displayName: Install MAUI
  inputs:
    targetType: 'inline'
    script: 
      dotnet workload restore

- task: DotNetCoreCLI@2
  inputs:
    command: 'restore'
    projects: '$(solution)'

- task: DotNetCoreCLI@2
  displayName: dotnet build
  inputs:
    projects: '$(solution)'
    arguments: '--configuration=$(buildConfiguration) /p:Platform="$(buildPlatform)" /p:Version=$(Build.BuildNumber) /p:AssemblyVersion=$(Build.BuildNumber) /p:FileVersion=$(Build.BuildNumber) '

- task: CopyFiles@2
  displayName: Copy nupkg files to staging
  inputs:
    SourceFolder: '$(system.defaultworkingdirectory)'
    Contents: '**/LoDaTek.*.nupkg'
    TargetFolder: '$(build.artifactstagingdirectory)'
    flattenFolders: true

- task: PublishBuildArtifacts@1
  displayName: Punlish artifacts
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'
